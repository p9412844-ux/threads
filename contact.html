<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Threads Downloader</title>
    <link rel="stylesheet" href="threads.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <i class="fa-brands fa-threads"></i>
            <span>Threads Downloader</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa fa-home"></i> HOME</a></li>
            <li><a href="contact.html" class="active"><i class="fa fa-comments"></i> CONTACT US</a></li>
            <li><a href="about.html"><i class="fa fa-info-circle"></i> ABOUT</a></li>
        </ul>
    </nav>

    
<!-- contact me -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-header">
                <h2>Contact <span>Me</span></h2>
            </div>

            <div class="contact-wrapper">
                <div class="contact-info">
                    <div class="info-item">
                        <div class="icon"><i class="fas fa-envelope"></i></div>
                        <div class="text">
                            <h3>Email Us</h3>
                            <p>p9412844@gmail.com</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="icon"><i class="fas fa-phone-alt"></i></div>
                        <div class="text">
                            <h3>Call Us</h3>
                            <p>03011090263</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="text">
                            <h3>Location</h3>
                            <p>dijkot ,faislabad, Pakistan</p>
                        </div>
                    </div>

                    <div class="social-links">
                        <a href="#"><i class="fab fa-facebook-f"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-linkedin-in"></i></a>
                        <a href="#"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>

                <div class="contact-form">
                    <form>
                        <div class="input-group">
                            <input type="text" placeholder="Full Name" required>
                        </div>
                        <div class="input-group">
                            <input type="email" placeholder="Email Address" required>
                        </div>
                        <div class="input-group">
                            <textarea placeholder="Your Message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
